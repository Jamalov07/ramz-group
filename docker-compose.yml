services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ramz_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-ramz_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ramz_user} -d ${DB_NAME:-ramz_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ramz_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    ports:
      - "${EXTERNAL_PORT:-5000}:3000"
    environment:
      APP_PORT: 3000
      APP_HOST: 0.0.0.0
      DATABASE_URL: postgresql://${DB_USER:-ramz_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-ramz_db}
      ACCESS_TOKEN_KEY: ${ACCESS_TOKEN_KEY}
      ACCESS_TOKEN_TIME: ${ACCESS_TOKEN_TIME}
      REFRESH_TOKEN_KEY: ${REFRESH_TOKEN_KEY}
      REFRESH_TOKEN_TIME: ${REFRESH_TOKEN_TIME}
      BOT_TOKEN: ${BOT_TOKEN}
      SELLING_CHANNEL_ID: ${SELLING_CHANNEL_ID}
      PAYMENT_CHANNEL_ID: ${PAYMENT_CHANNEL_ID}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ramz_network

volumes:
  postgres_data:
  uploads_data:

networks:
  ramz_network:
    driver: bridge
